<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sim's Story | Story Telling App</title>
    <link rel="stylesheet" href="Style.css">
    <script src="https://kit.fontawesome.com/a2fde27003.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="brand-header">
        <a href="#" class="brand">Sim's Story</a>
        <div class="social-icons">

        <div>
            <h1>Do you want to hear a story?</h1>
